<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerenciador de Fazendas</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#4CAF50,#81C784);
        }

        .login-container{
            width:100%;
            max-width:400px;
            padding:20px;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#2E7D32;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        label{
            font-weight:bold;
        }

        input{
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border-color:#4CAF50;
            box-shadow:0 0 8px rgba(76,175,80,0.3);
        }

        button{
            margin-top:10px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4CAF50;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#388E3C;
        }

        .links{
            margin-top:15px;
            display:flex;
            justify-content:space-between;
        }

        .links a{
            text-decoration:none;
            color:#2E7D32;
            font-size:14px;
        }

        .links a:hover{
            text-decoration:underline;
        }

        .logo{
            text-align:center;
            font-size:50px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="card">

            <div class="logo">🌱</div>

            <h1>Fazer Login</h1>

            <form>

                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu email"
                    required
                >

                <label for="senha">Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required
                >

                <button type="submit">
                    Entrar
                </button>

            </form>

            <div class="links">
                <a href="#">Esqueci minha senha</a>
                <a href="#">Criar conta</a>
            </div>

        </div>

    </div>

</body>
</html>
